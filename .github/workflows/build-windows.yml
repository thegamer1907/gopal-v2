name: Build Windows

# Publish a Windows .exe as a GitHub Release.
# Trigger by pushing a tag like v1.0.0:
#   git tag v1.0.0 && git push origin v1.0.0
# The Release page then gives a public direct-download link to the .exe.
# (Also runnable manually from the Actions tab via workflow_dispatch.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the Release and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform windows/amd64 -clean

      - name: Rename binary with version
        shell: bash
        run: |
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          cp build/bin/gopal-v2.exe "dist/gopal-v2-${tag}-windows-amd64.exe"

      - name: Upload artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: gopal-v2-windows-amd64
          path: dist/*.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
